apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: 
  name: {{ .Values.hpa.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.hpa.name }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
  {{- if .Values.hpa.targetCPUUsagePercentage }}
    - type: Resource
      resource: 
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetCPUUsagePercentage }}
  {{- end }}
  {{- if .Values.hpa.targetMemoryUsagePercentage }}
    - type: Resource
      resource: 
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.targetMemoryUsagePercentage }}
  {{- end }}
